<!DOCTYPE busconfig PUBLIC
  "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
  "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">

<!--
  org.freedesktop.hostname1.conf
  D-Bus system bus security policy for hostnamed.

  Rules:
    • Only root may own the well-known name.
    • Any user may call the introspection / property-read interfaces.
    • Any user may call the read-only methods (GetProductUUID, GetHardwareSerial,
      Describe).  The daemon's polkit checks enforce further authorisation for
      the Set* methods, so we allow all method calls here and let polkit be the
      real gate.
    • No user may send arbitrary signals to the service (avoids spoofing
      PropertiesChanged).
-->

<busconfig>

  <policy user="root">
    <allow own="org.freedesktop.hostname1"/>
    <allow send_destination="org.freedesktop.hostname1"/>
    <allow receive_sender="org.freedesktop.hostname1"/>
  </policy>

  <policy context="default">
    <!-- Allow everyone to talk to the service; polkit handles authorisation -->
    <allow send_destination="org.freedesktop.hostname1"/>
    <allow receive_sender="org.freedesktop.hostname1"/>
  </policy>

</busconfig>
